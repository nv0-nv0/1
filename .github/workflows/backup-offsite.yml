name: nv0-offsite-backup

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      NV0_BASE_URL: ${{ secrets.NV0_BACKUP_BASE_URL }}
      NV0_ADMIN_TOKEN: ${{ secrets.NV0_BACKUP_ADMIN_TOKEN }}
      NV0_BACKUP_PASSPHRASE: ${{ secrets.NV0_BACKUP_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create encrypted backup
        run: |
          python scripts/backup_state.py --output-dir .offsite-backups --retention 30
      - name: Verify latest backup integrity
        run: |
          latest=$(ls -1t .offsite-backups/*.enc | head -n 1)
          python scripts/restore_state.py --verify-only "$latest"
      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: nv0-offsite-backup
          path: .offsite-backups/*
          retention-days: 14
      - name: Commit encrypted backup to backup branch
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin backup-snapshots >/dev/null 2>&1; then
            git fetch origin backup-snapshots
            git switch backup-snapshots
          else
            git switch --orphan backup-snapshots
            git rm -rf . >/dev/null 2>&1 || true
            mkdir -p archived-backups
          fi
          mkdir -p archived-backups
          cp -f .offsite-backups/* archived-backups/
          ls -1t archived-backups | tail -n +61 | xargs -r -I{} rm -f "archived-backups/{}"
          git add archived-backups
          git commit -m "backup: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || exit 0
          git push origin backup-snapshots
