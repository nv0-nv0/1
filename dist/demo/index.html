<body class="demo" data-page="demo">
<header class="site-header" id="site-header"></header>

<main><section class="section"><div class="container form-shell"><article class="card strong"><div class="crumbs"><a href="../index.html">HOME</a><span class="sep">/</span><span>데모</span></div><span class="kicker">Quick demo</span><h1>관심 있는 제품을 골라 바로 샘플 결과를 확인해 보세요</h1><p class="lead">샘플 결과를 바로 확인하면서 데모 신청 정보도 함께 저장됩니다. 마음에 들면 같은 흐름으로 제품 상세에서 바로 구매까지 이어가실 수 있습니다.</p><form id="demo-form"><div class="form-grid"><div><label>제품</label><select name="product" data-prefill="product" required><option value="veridion">Veridion · 첫 화면 설명과 구매 버튼 주변 문장을 더 설득력 있게 바꿔 전환을 높이는 카피 제품</option><option value="clearport">ClearPort · 수출입 안내, 준비 서류, 고객 응대 문장을 더 쉽게 정리해 업무 부담을 줄이는 문서 제품</option><option value="grantops">GrantOps · 지원사업 공고를 실제 제출 준비와 자료 정리까지 이어주는 실행형 제품</option><option value="draftforge">DraftForge · 초안 이후 검토, 승인, 최종본 정리를 더 빠르게 끝내는 콘텐츠 운영 제품</option></select></div><div><label>회사명</label><input name="company" placeholder="회사명" autocomplete="organization" required></div><div><label>담당자명</label><input name="name" placeholder="담당자명" autocomplete="name" required></div><div><label>이메일</label><input name="email" type="email" placeholder="email@company.com" autocomplete="email" inputmode="email" required></div><div><label>팀 규모</label><input name="team" placeholder="예: 3인 운영팀" autocomplete="organization-title"></div><div><label>목표</label><input name="goal" placeholder="예: 첫 화면에서 바로 이해되게" required></div><div><label>핵심 키워드</label><input name="keywords" placeholder="예: 신뢰, CTA, 전환"></div></div><div class="actions"><button class="button" type="submit">무료 샘플과 데모 코드 받기</button></div></form><div class="result-box" id="demo-result" role="status" aria-live="polite"></div></article><article class="card"><span class="tag">바로가기</span><h3>마음에 드는 제품으로 바로 이어서 검토하세요</h3><div class="story-grid" id="module-matrix"></div></article></div></section></main>

<footer class="footer" id="site-footer"></footer>
</body>
</html>
