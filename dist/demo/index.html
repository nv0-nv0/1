<main><section class="section"><div class="container form-shell"><article class="card strong"><div class="crumbs"><a href="../index.html">HOME</a><span class="sep">/</span><span>데모</span></div><span class="kicker">Quick demo</span><h1>관심 있는 제품을 골라 바로 샘플 결과를 확인해 보세요</h1><p class="lead">몇 가지 정보만 입력하면 내 상황에 맞춘 샘플 결과를 즉시 확인할 수 있습니다. 마음에 들면 같은 흐름으로 제품 상세에서 바로 구매까지 이어가실 수 있습니다.</p><form id="demo-form"><div class="form-grid"><div><label>제품</label><select name="product" data-prefill="product"><option value="veridion">Veridion · 첫 화면 한 줄과 구매 버튼 주변 문장을 더 설득력 있게 바꿔 주는 전환 개선 제품</option><option value="clearport">ClearPort · 수출입 준비 서류와 안내 문장을 더 쉽게 정리해 주는 실무형 문서 제품</option><option value="grantops">GrantOps · 지원사업 공고를 실제 제출 준비까지 끌고 가는 실행 가이드 제품</option><option value="draftforge">DraftForge · 초안 이후 검토와 승인, 최종본 정리를 더 빠르게 묶어 주는 콘텐츠 제품</option></select></div><div><label>회사명</label><input name="company" placeholder="회사명"></div><div><label>목표</label><input name="goal" placeholder="예: 첫 화면에서 바로 이해되게"></div><div><label>핵심 키워드</label><input name="keywords" placeholder="예: 신뢰, CTA, 전환"></div></div><div class="actions"><button class="button" type="submit">샘플 결과 바로 보기</button></div></form><div class="result-box" id="demo-result"></div></article><article class="card"><span class="tag">바로가기</span><h3>마음에 드는 제품으로 바로 이어가세요</h3><div class="story-grid" id="module-matrix"></div></article></div></section></main>
