<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no">
  <meta name="color-scheme" content="light">
  <title>문의 | NV0</title>
  <meta name="description" content="제품 문의">
  <link rel="canonical" href="https://nv0.kr/contact/">

<body class="contact" data-page="contact">
<header class="site-header" id="site-header"></header>

<main><section class="section"><div class="container form-shell"><article class="card strong"><div class="crumbs"><a href="../index.html">HOME</a><span class="sep">/</span><span>문의</span></div><span class="kicker">Contact</span><h1>내 상황에 맞는 제품인지 편하게 상담받아 보세요</h1><p class="lead">가격, 결과물, 결제 방식처럼 제품을 고르기 전에 궁금한 점이 있으면 이 폼으로 남기실 수 있습니다.</p><form id="contact-form"><div class="form-grid"><div><label>관심 제품</label><select name="product" data-prefill="product" required><option value="">선택</option><option value="veridion">Veridion</option><option value="clearport">ClearPort</option><option value="grantops">GrantOps</option><option value="draftforge">DraftForge</option></select></div><div><label>회사명</label><input name="company" placeholder="회사명" autocomplete="organization" required></div><div><label>담당자명</label><input name="name" placeholder="담당자명" autocomplete="name" required></div><div><label>이메일</label><input name="email" type="email" placeholder="email@company.com" autocomplete="email" inputmode="email" required></div><div><label>문의 내용</label><input name="issue" placeholder="예: 가격, 결과물, 적용 범위" required></div></div><div class="actions"><button class="button" type="submit">상담 요청 보내기</button></div></form><div class="result-box" id="contact-result" role="status" aria-live="polite"></div></article><article class="card"><span class="tag">안내</span><p>회사 소개는 회사 메뉴에서, 실제 체험과 구매는 제품 메뉴에서, 추가 질문은 이 페이지에서 편하게 남기실 수 있습니다.</p></article></div></section></main>

<footer class="footer" id="site-footer"></footer>
</body>
</html>
