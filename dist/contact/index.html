<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no">
  <meta name="color-scheme" content="light">
  <title>예외 문의 | NV0</title>
  <meta name="description" content="예외 조건 확인">
  <link rel="canonical" href="https://nv0.kr/contact/">
  <link rel="stylesheet" href="../assets/site.css">
  <script src="../assets/site-data.js"></script>
  <script defer src="../assets/site.js"></script>
</head>
<body class="contact" data-page="contact">
<header class="site-header" id="site-header"></header>

<main><section class="section"><div class="container form-shell"><article class="card strong"><div class="crumbs"><a href="../index.html">HOME</a><span class="sep">/</span><span>예외 문의</span></div><span class="kicker">Contact</span><h1>자동 흐름으로 바로 판단하기 어려운 조건만 따로 남기실 수 있게 줄였습니다</h1><p class="lead">일반적인 검토는 제품 페이지, 즉시 데모, 결제로 충분하도록 구성했습니다. 이곳에서는 세금계산서, 계약 범위, 특수 일정처럼 예외적인 조건만 따로 남겨 더 빠르게 확인할 수 있습니다.</p><form id="contact-form"><div class="form-grid"><div><label>관심 제품</label><select name="product" data-prefill="product" required><option value="">선택</option><option value="veridion">Veridion </option><option value="clearport">ClearPort </option><option value="grantops">GrantOps </option><option value="draftforge">DraftForge </option></select></div><div><label>회사명</label><input name="company" placeholder="회사명" autocomplete="organization" required></div><div><label>담당자명</label><input name="name" placeholder="담당자명" autocomplete="name" required></div><div><label>이메일</label><input name="email" type="email" placeholder="email@company.com" autocomplete="email" inputmode="email" required></div><div><label>전화번호 (선택)</label><input name="phone" placeholder="연락 가능한 번호"></div><div><label>회신 희망 시간 (선택)</label><input name="replyWindow" placeholder="예: 평일 2~5시"></div><div><label>긴급도 (선택)</label><select name="urgency"><option value="">선택 안 함</option><option value="normal">일반</option><option value="soon">이번 주 내</option><option value="urgent">긴급</option></select></div><div><label>참고 링크 (선택)</label><input name="referenceUrl" placeholder="대표 URL 또는 문서 링크"></div><div class="span-2"><label>확인 내용</label><textarea name="issue" rows="4" placeholder="예: 계약서, 세금계산서, 일정 조율, 공개 범위, 보안 요구사항" required></textarea></div></div><div class="actions"><button class="button" type="submit">예외 문의 남기기</button><a class="button ghost" href="../demo/index.html">즉시 데모로 돌아가기</a></div></form><div class="result-box" id="contact-result" role="status" aria-live="polite"></div></article><article class="card"><span class="tag">권장 경로</span><ul class="clean"><li>먼저 제품 상세 또는 가격 페이지를 확인합니다.</li><li>즉시 데모로 방향을 확인합니다.</li><li>결제가 가능한 경우 바로 진행합니다.</li><li>정말 예외가 있을 때만 이 폼을 사용합니다.</li></ul></article></div></section></main>

<footer class="footer" id="site-footer"></footer>
</body>
</html>
