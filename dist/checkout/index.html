<main><section class="section"><div class="container form-shell"><article class="card strong"><div class="crumbs"><a href="../index.html">HOME</a><span class="sep">/</span><span>주문</span></div><span class="kicker">Checkout</span><h1>선택한 제품을 바로 결제하고 결과 확인까지 이어갈 수 있습니다</h1><p class="lead">플랜을 고르고 결제 버튼을 누르면 외부 결제창으로 이동합니다. 결제 완료 뒤에는 결과 자료를 바로 확인할 수 있고, 공개 글은 원할 때 별도로 둘러보실 수 있습니다.</p><form id="checkout-form"><div class="form-grid"><div><label>제품</label><select name="product" data-prefill="product"><option value="veridion">Veridion · 49만부터</option><option value="clearport">ClearPort · 39만부터</option><option value="grantops">GrantOps · 39만부터</option><option value="draftforge">DraftForge · 29만부터</option></select></div><div><label>플랜</label><select name="plan" data-prefill="plan"><option value="Starter">Starter</option><option value="Growth">Growth</option><option value="Scale">Scale</option></select></div><div><label>과금 기준</label><select name="billing"><option value="one-time">1회 결제</option><option value="monthly">월 과금</option><option value="project">프로젝트형</option></select></div><div><label>결제 방식</label><select name="paymentMethod"><option value="toss">Toss 결제</option><option value="invoice">세금계산서/송장</option></select></div><div><label>회사명</label><input name="company" placeholder="회사명"></div><div><label>담당자명</label><input name="name" placeholder="담당자명"></div><div><label>이메일</label><input name="email" type="email" placeholder="email@company.com"></div><div><label>추가 요청</label><input name="note" placeholder="예: 원하는 톤, 꼭 포함할 내용"></div></div><div class="actions"><button class="button" type="submit">결제창 열기</button><a class="button ghost" href="../pricing/index.html">가격 먼저 보기</a></div></form><div class="result-box" id="checkout-result"></div></article><article class="card accent"><span class="tag" style="background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12);color:#fff">결제 안내</span><h3 style="font-size:1.72rem;margin:16px 0 10px">지금 구매하기를 누르면 바로 외부 결제창으로 이어집니다</h3><ul class="clean inverse-list"><li>플랜 확인</li><li>외부 결제 진행</li><li>결제 완료 확인</li><li>결과물 준비</li><li>결과 자료 확인</li></ul></article></div></section></main>
