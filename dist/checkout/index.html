<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no">
  <meta name="color-scheme" content="light">
  <title>결제 | NV0</title>
  <meta name="description" content="제품 결제 및 자동 제공 진입">

  <script defer src="../assets/site.js"></script>
</head>
<body class="checkout" data-page="checkout">
<header class="site-header" id="site-header"></header>

<main><section class="section"><div class="container form-shell"><article class="card strong"><div class="crumbs"><a href="../index.html">HOME</a><span class="sep">/</span><span>결제</span></div><span class="kicker">Checkout</span><h1>꼭 필요한 항목만 입력하고 바로 결제로 이어지게 바꿨습니다</h1><p class="lead">제품, 플랜, 회사명, 담당자명, 이메일만 있으면 결제 준비를 시작할 수 있습니다. 자세한 맥락은 메모에 한 줄만 남기면 됩니다.</p><form id="checkout-form"><div class="form-grid"><div><label>제품</label><select name="product" data-prefill="product" required><option value="veridion">Veridion · 29만부터</option><option value="clearport">ClearPort · 39만부터</option><option value="grantops">GrantOps · 49만부터</option><option value="draftforge">DraftForge · 29만부터</option></select></div><div><label>플랜</label><select name="plan" data-prefill="plan" required><option value="Starter">Starter</option><option value="Growth">Growth</option><option value="Scale">Scale</option></select></div><div><label>회사명</label><input name="company" placeholder="회사명" autocomplete="organization" required></div><div><label>담당자명</label><input name="name" placeholder="담당자명" autocomplete="name" required></div><div><label>이메일</label><input name="email" type="email" placeholder="email@company.com" autocomplete="email" inputmode="email" required></div><div><label>추가 요청</label><input name="note" placeholder="선택 입력"></div><div><label>결제 유형</label><select name="billing"><option value="one-time">1회 결제형</option></select></div><div><label>결제 방식</label><select name="paymentMethod" required><option value="toss">Toss 결제</option></select></div></div><div class="actions"><button class="button" type="submit">결제 진행하기</button><a class="button ghost" href="../pricing/index.html">가격 먼저 보기</a></div></form><div class="result-box" id="checkout-result" role="status" aria-live="polite"></div></article><article class="card"><span class="tag">간단 안내</span><details class="fold-card" open><summary><strong>핵심만 먼저</strong><span>결제 완료 후 포털에서 결과와 제공 상태를 확인합니다.</span></summary><div><ol class="flow-list"><li>결제 준비 정보 저장</li><li>외부 결제창 이동</li><li>결제 완료 확인</li><li>결과물 및 공개 글 연결</li><li>포털 조회 코드 확인</li></ol></div></details></article></div></section></main>

<footer class="footer" id="site-footer"></footer>
</body>
</html>
