services:
  nv0-company:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: ${PORT:-8000}
      NV0_BASE_URL: ${NV0_BASE_URL:-https://nv0.kr}
      NV0_DATA_DIR: /app/data
      NV0_BACKUP_DIR: /app/backups
      NV0_BACKUP_RETENTION: ${NV0_BACKUP_RETENTION:-28}
      NV0_BACKUP_PASSPHRASE: ${NV0_BACKUP_PASSPHRASE:?set-a-long-random-backup-passphrase}
      NV0_HSTS_ENABLED: ${NV0_HSTS_ENABLED:-1}
      NV0_PUBLIC_RATE_LIMIT_PER_MIN: ${NV0_PUBLIC_RATE_LIMIT_PER_MIN:-30}
      NV0_ADMIN_RATE_LIMIT_PER_MIN: ${NV0_ADMIN_RATE_LIMIT_PER_MIN:-60}
      NV0_PORTAL_RATE_LIMIT_PER_MIN: ${NV0_PORTAL_RATE_LIMIT_PER_MIN:-40}
      NV0_PAYMENT_PROVIDER: ${NV0_PAYMENT_PROVIDER:-toss}
      NV0_BOARD_ONLY_MODE: ${NV0_BOARD_ONLY_MODE:-0}
      NV0_ADMIN_TOKEN: ${NV0_ADMIN_TOKEN:?set-a-long-random-admin-token}
      NV0_TOSS_CLIENT_KEY: ${NV0_TOSS_CLIENT_KEY:-}
      NV0_TOSS_SECRET_KEY: ${NV0_TOSS_SECRET_KEY:-}
      NV0_TOSS_WEBHOOK_SECRET: ${NV0_TOSS_WEBHOOK_SECRET:-}
      NV0_TOSS_MOCK: ${NV0_TOSS_MOCK:-0}
      NV0_ALLOWED_HOSTS: ${NV0_ALLOWED_HOSTS:-nv0.kr,www.nv0.kr,localhost,127.0.0.1}
      NV0_ALLOWED_ORIGINS: ${NV0_ALLOWED_ORIGINS:-https://nv0.kr,https://www.nv0.kr}
      NV0_ENABLE_DOCS: ${NV0_ENABLE_DOCS:-0}
      NV0_PUBLIC_HEALTH_VERBOSE: ${NV0_PUBLIC_HEALTH_VERBOSE:-0}
      NV0_ENFORCE_CANONICAL_HOST: ${NV0_ENFORCE_CANONICAL_HOST:-1}
      NV0_CANONICAL_HOST: ${NV0_CANONICAL_HOST:-nv0.kr}
      NV0_CANONICAL_SCHEME: ${NV0_CANONICAL_SCHEME:-https}
    volumes:
      - nv0_company_data:/app/data
      - nv0_company_backups:/app/backups
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import os,urllib.request;
          req=urllib.request.Request(
          'http://127.0.0.1:%s/api/health' % os.getenv('PORT','8000'),
          headers={'Host':'nv0.kr'}
          );
          urllib.request.urlopen(req, timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    user: "10001:10001"
    cap_drop:
      - ALL
    restart: unless-stopped

  nv0-company-backup:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - nv0-company
    command: ["sh", "-lc", "python scripts/backup_scheduler.py"]
    environment:
      NV0_BASE_URL: http://nv0-company:8000
      NV0_ADMIN_TOKEN: ${NV0_ADMIN_TOKEN:?set-a-long-random-admin-token}
      NV0_BACKUP_DIR: /app/backups
      NV0_BACKUP_RETENTION: ${NV0_BACKUP_RETENTION:-28}
      NV0_BACKUP_INTERVAL_SECONDS: ${NV0_BACKUP_INTERVAL_SECONDS:-21600}
      NV0_BACKUP_PASSPHRASE: ${NV0_BACKUP_PASSPHRASE:?set-a-long-random-backup-passphrase}
    volumes:
      - nv0_company_backups:/app/backups
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    user: "10001:10001"
    cap_drop:
      - ALL
    restart: unless-stopped
volumes:
  nv0_company_data:
  nv0_company_backups:
